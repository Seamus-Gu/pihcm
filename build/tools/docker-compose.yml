    #       timeout: 10s
    #       retries: 5
    #       start_period: 10s
    #     networks:
    #       - ihcm
    #     <<: *self-hosts

    pihcm_consul:
        image: ${DOCKER_REGISTRY}/tools/consul:1.15.4
        container_name: pihcm_consul
        restart: always
        volumes:
            - ${DEVELOP_PATH}/Consul/server.json:/consul/config/server.json
            - ${DEVELOP_PATH}/Consul/Data:/consul/data
            - ${DEVELOP_PATH}/Consul/localtime:/etc/localtime:ro
        ports:
            - "${CONSUL_PORT}:8500"
        #   - '${CONSUL_NODE_PORT}:8300'
        #   - '${CONSUL_DNS_PORT}:8600'
        command: agent -server -ui -bootstrap-expect=1 -client=0.0.0.0 -data-dir consul/data
        healthcheck:
            test:
                ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 30s
        networks:
            - pihcm
        <<: *self-hosts

networks:
    pihcm:
        external: true
        driver: bridge
        name: pihcm
