volumes:
    redis_data:
    consul_data:

x-hosts: &self-hosts
    cap_add:
        - SYS_PTRACE
    logging:
        driver: "json-file" #默认的文件日志驱动
        options:
            max-size: "256m"
            max-file: "3"

services:
    #   pihcm_redis:
