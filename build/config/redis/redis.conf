daemonize no
bind 0.0.0.0
protected-mode yes
port 6379

# 持久化
dir /data
dbfilename dump.rdb
save 900 1
save 300 10
save 60 10000


appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
aof-use-rdb-preamble yes

# 内存管理
maxmemory 4GB
maxmemory-policy allkeys-lru
maxmemory-samples 5

# 性能优化
io-threads 4
io-threads-do-reads yes
tcp-backlog 1028
lazyfree-lazy-eviction yes

# 安全
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG "REDIS-CONFIG-SECURE"

# 监控
slowlog-log-slower-than 10000
slowlog-max-len 128
latency-monitor-threshold 100


# 日志
loglevel notice
logfile /data/redis.log